name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project would this affect?
      options:
        - Web app (Next.js)
        - Studio (Sanity)
        - Bot (Telegram)
        - Schema / Content Model
        - Email / Functions
        - Queries (GROQ)
        - CI / Build
        - Documentation
        - New integration
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why would it be useful for a conference starter?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.
    validations:
      required: false
